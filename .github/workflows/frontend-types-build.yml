name: Frontend Types and Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: frontend-types-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  types-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run type checks
        run: npm run types:check

      - name: Build frontend assets
        run: npm run build